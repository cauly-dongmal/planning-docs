<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PointClick RCPC 프론트엔드 UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans KR','sans-serif']}}}}</script>
  <style>
    body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#f8fafc}
    #root{min-height:100vh}
    .phone-frame{width:375px;height:700px;border-radius:40px;border:8px solid #1a1a2e;background:#fff;overflow:hidden;position:relative;box-shadow:0 25px 60px rgba(0,0,0,.15)}
    .phone-notch{width:150px;height:28px;background:#1a1a2e;border-radius:0 0 20px 20px;margin:0 auto;position:relative;z-index:10}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .fade-in-up{animation:fadeInUp .4s ease-out}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const{useState,useEffect,useCallback}=React;

    const STEPS=[
      {id:'offerwall',label:'오퍼월 홈',icon:'📱'},
      {id:'detail',label:'상세 페이지',icon:'📄'},
      {id:'ad_click',label:'광고 클릭',icon:'👆'},
      {id:'countdown',label:'5초 카운트',icon:'⏱'},
      {id:'complete',label:'참여 완료',icon:'✅'},
      {id:'exhausted',label:'소진 안내',icon:'🚫'},
      {id:'invalid',label:'무효 클릭',icon:'⚠️'},
    ];

    function OfferwallScreen({onNavigate}){
      return(
        <div className="h-full bg-gray-50 overflow-y-auto">
          <div className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white px-4 py-3"><div className="text-sm font-medium">PointClick</div></div>
          <div className="p-3 space-y-2">
            <div className="bg-white rounded-xl p-3 shadow-sm border">
              <div className="flex items-center gap-2 mb-2"><span>🏆</span><span className="text-sm font-semibold text-gray-800">매체명 Pick!</span></div>
              <div className="space-y-1.5">{['캐시워크 설치하고 500P 받기','토스 첫 가입 혜택 300P'].map((t,i)=>(<div key={i} className="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2"><span className="text-xs text-gray-600">{t}</span><span className="text-xs font-bold text-blue-600">+{(i+1)*200}P</span></div>))}</div>
            </div>
            <div className="bg-white rounded-xl p-3 shadow-sm border"><div className="flex items-center gap-2"><span>📅</span><span className="text-sm font-semibold text-gray-800">출석체크</span><span className="ml-auto text-xs text-blue-600 font-bold">+10P</span></div></div>
            <div className="bg-white rounded-xl p-3 shadow-sm border"><div className="flex items-center gap-2"><span>▶️</span><span className="text-sm font-semibold text-gray-800">동영상 보고 리워드 적립하기</span></div></div>
            <div onClick={()=>onNavigate('detail')} className="relative bg-gradient-to-r from-orange-50 to-amber-50 rounded-xl p-3 shadow-sm border-2 border-orange-300 cursor-pointer hover:shadow-md transition-all group">
              <div className="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">NEW</div>
              <div className="flex items-center gap-2 mb-1"><span>📺</span><span className="text-sm font-semibold text-gray-800">보는 광고</span></div>
              <p className="text-xs text-gray-500">매일 광고 클릭하고 리워드 받자!</p>
              <div className="absolute right-3 top-1/2 -translate-y-1/2 text-orange-400 group-hover:translate-x-1 transition-transform">›</div>
            </div>
            <div className="bg-white rounded-xl p-3 shadow-sm border">
              <div className="flex items-center gap-2 mb-2"><span>📋</span><span className="text-sm font-semibold text-gray-800">오늘의 미션</span></div>
              <div className="space-y-1.5">{['리니지W 사전예약','쿠팡이츠 첫 주문'].map((t,i)=>(<div key={i} className="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2"><span className="text-xs text-gray-600">{t}</span><span className="text-xs font-bold text-green-600">+{500+i*300}P</span></div>))}</div>
            </div>
          </div>
        </div>
      );
    }

    function DetailScreen({onNavigate}){
      return(
        <div className="h-full bg-white overflow-y-auto">
          <div className="bg-white border-b px-4 py-3 flex items-center gap-3"><button onClick={()=>onNavigate('offerwall')} className="text-gray-600 text-lg">‹</button><span className="text-sm font-semibold">RCPC</span><button className="ml-auto text-gray-400 text-sm">?</button></div>
          <div className="p-4">
            <div className="text-center mb-4"><div className="inline-flex items-center gap-1 bg-orange-100 text-orange-700 text-xs font-medium px-3 py-1 rounded-full mb-2"><span>신규</span></div><h2 className="text-lg font-bold text-gray-900">매일 광고 클릭하고<br/>리워드 받자!</h2><p className="text-xs text-gray-500 mt-1">매일 1시간마다 광고 누르면 리워드 지급</p></div>
            <div onClick={()=>onNavigate('ad_click')} className="bg-gradient-to-br from-purple-700 to-indigo-800 rounded-2xl p-4 mb-4 cursor-pointer hover:scale-[1.02] transition-transform shadow-lg">
              <div className="text-white"><p className="text-[10px] opacity-70 mb-1">AD</p><p className="text-sm font-bold">리니지W 최대 80억<br/>아데나 획득 찬스!</p><p className="text-xs opacity-80 mt-2">지금 캐릭터 사전생성 하세요!</p><div className="mt-3 bg-white/20 rounded-lg px-3 py-1.5 text-center text-xs font-medium">신청하기</div></div>
            </div>
            <div className="bg-gray-50 rounded-xl p-3 text-xs text-gray-500 space-y-1"><p className="font-medium text-gray-700 mb-1">참여안내</p><p>• 참여는 매일 1시간마다 새롭게 가능합니다</p><p>• 광고는 꼭 "배너를 눌러야" 보상이 지급됩니다</p><p>• 광고를 불러오지 못하는 경우 다시 시도해주세요</p></div>
          </div>
        </div>
      );
    }

    function AdCountdownScreen({onNavigate}){
      const[count,setCount]=useState(5);const[canClose,setCanClose]=useState(false);
      useEffect(()=>{if(count>0){const t=setTimeout(()=>setCount(c=>c-1),1000);return()=>clearTimeout(t)}else setCanClose(true)},[count]);
      return(
        <div className="h-full bg-gray-900 flex flex-col">
          <div className="flex items-center justify-between px-4 py-3"><span className="text-white/60 text-xs">AD</span>{canClose?<button onClick={()=>onNavigate('complete')} className="bg-white text-gray-900 text-xs font-bold px-3 py-1 rounded-full animate-pulse">✕ 닫기</button>:<div className="bg-white/20 text-white text-xs px-3 py-1 rounded-full">{count}초 후 닫기</div>}</div>
          <div className="px-4"><div className="h-1 bg-white/20 rounded-full overflow-hidden"><div className="h-full bg-orange-400 rounded-full transition-all duration-1000 ease-linear" style={{width:`${((5-count)/5)*100}%`}}/></div></div>
          <div className="flex-1 flex items-center justify-center p-6"><div className="bg-gradient-to-br from-purple-700 to-indigo-900 rounded-2xl p-6 text-white text-center w-full max-w-xs shadow-2xl"><div className="text-3xl mb-3">🎮</div><p className="text-lg font-bold mb-2">리니지W</p><p className="text-sm opacity-80">최대 80억 아데나<br/>획득 찬스!</p><div className="mt-4 bg-white/20 rounded-xl py-2 text-sm font-medium">지금 사전생성 →</div></div></div>
          <div className="text-center pb-6">{canClose?<p className="text-green-400 text-sm font-medium fade-in-up">✅ 광고 시청 완료! 닫기를 눌러주세요</p>:<p className="text-white/50 text-xs">광고 클릭 {count}초 후 참여 가능</p>}</div>
        </div>
      );
    }

    function CompleteScreen({onNavigate}){return(<div className="h-full bg-white flex flex-col items-center justify-center p-6"><div className="fade-in-up text-center"><div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><span className="text-4xl">✅</span></div><h2 className="text-xl font-bold text-gray-900 mb-1">참여 완료!</h2><div className="bg-gradient-to-r from-orange-500 to-amber-500 text-white text-2xl font-bold rounded-xl px-6 py-3 my-3 shadow-lg" style={{animation:'pulse 2s infinite'}}>+5P 적립</div><p className="text-sm text-gray-500 mt-2">다음 참여까지 <span className="font-bold text-blue-600">1시간</span> 남음</p><button onClick={()=>onNavigate('offerwall')} className="mt-6 bg-blue-600 text-white px-8 py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700 transition">오퍼월로 돌아가기</button></div></div>)}

    function ExhaustedScreen({onNavigate}){return(<div className="h-full bg-white flex flex-col items-center justify-center p-6"><div className="fade-in-up text-center"><div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4"><span className="text-4xl">😢</span></div><h2 className="text-lg font-bold text-gray-900 mb-2">오늘 클릭할 수 있는 광고가<br/>모두 소진되었습니다.</h2><p className="text-sm text-gray-500">내일 다시 참여해주세요!</p><button onClick={()=>onNavigate('offerwall')} className="mt-6 bg-gray-600 text-white px-8 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-700 transition">오퍼월로 돌아가기</button></div></div>)}

    function InvalidScreen({onNavigate}){return(<div className="h-full bg-white flex flex-col items-center justify-center p-6"><div className="fade-in-up text-center"><div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4"><span className="text-4xl">⚠️</span></div><h2 className="text-lg font-bold text-gray-900 mb-2">참여 불가</h2><p className="text-sm text-gray-500 mb-1">카울리 클릭 서버에서 무효 클릭으로 판정되었습니다.</p><p className="text-xs text-gray-400">광고주 랜딩이 차단되며, 리워드가 지급되지 않습니다.</p><button onClick={()=>onNavigate('offerwall')} className="mt-6 bg-gray-600 text-white px-8 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-700 transition">오퍼월로 돌아가기</button></div></div>)}

    function App(){
      const[currentStep,setCurrentStep]=useState('offerwall');
      const navigate=useCallback(s=>setCurrentStep(s),[]);
      const renderScreen=()=>{switch(currentStep){case'offerwall':return<OfferwallScreen onNavigate={navigate}/>;case'detail':return<DetailScreen onNavigate={navigate}/>;case'ad_click':case'countdown':return<AdCountdownScreen onNavigate={navigate}/>;case'complete':return<CompleteScreen onNavigate={navigate}/>;case'exhausted':return<ExhaustedScreen onNavigate={navigate}/>;case'invalid':return<InvalidScreen onNavigate={navigate}/>;default:return<OfferwallScreen onNavigate={navigate}/>}};
      return(
        <div className="min-h-screen bg-slate-50 flex flex-col items-center py-6 px-4">
          <div className="phone-frame"><div className="phone-notch"/><div style={{height:'calc(100% - 28px)'}}>{renderScreen()}</div></div>
          <div className="mt-4 flex flex-wrap justify-center gap-1.5">
            {STEPS.slice(0,5).map((s,i)=>(<React.Fragment key={s.id}><button onClick={()=>navigate(s.id)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all ${currentStep===s.id?'bg-blue-600 text-white':'bg-white text-gray-600 border hover:bg-gray-50'}`}>{s.icon} {s.label}</button>{i<4&&<span className="text-gray-300 self-center text-xs">→</span>}</React.Fragment>))}
          </div>
          <div className="mt-2 flex gap-1.5">
            <button onClick={()=>navigate('exhausted')} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium ${currentStep==='exhausted'?'bg-amber-500 text-white':'bg-amber-50 text-amber-700 border border-amber-200'}`}>🚫 소진</button>
            <button onClick={()=>navigate('invalid')} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium ${currentStep==='invalid'?'bg-red-500 text-white':'bg-red-50 text-red-700 border border-red-200'}`}>⚠️ 무효</button>
          </div>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
