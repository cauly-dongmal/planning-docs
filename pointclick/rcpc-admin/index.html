<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PointClick RCPC 어드민 UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans KR','sans-serif']}}}}</script>
  <style>
    body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#f1f5f9}
    #root{min-height:100vh}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeInUp .3s ease-out}
    .toggle-track{transition:background-color .2s}.toggle-thumb{transition:transform .2s}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const{useState}=React;

    function Toggle({checked,onChange,label}){
      return(<label className="flex items-center gap-3 cursor-pointer"><div onClick={()=>onChange(!checked)} className={`relative w-11 h-6 rounded-full toggle-track ${checked?'bg-blue-600':'bg-gray-300'}`}><div className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow toggle-thumb ${checked?'translate-x-5':''}`}/></div>{label&&<span className="text-sm text-gray-700 font-medium">{label}</span>}</label>);
    }

    function Select({value,onChange,options,label,required}){
      return(<div><label className="block text-xs font-medium text-gray-600 mb-1">{required&&<span className="text-red-500 mr-0.5">*</span>}{label}</label><select value={value} onChange={e=>onChange(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>);
    }

    function Input({value,onChange,label,placeholder,required,helperText,isNew}){
      return(<div><label className="flex items-center gap-2 text-xs font-medium text-gray-600 mb-1">{required&&<span className="text-red-500">*</span>}{label}{isNew&&<span className="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">신규</span>}</label><input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"/>{helperText&&<p className="text-[11px] text-gray-400 mt-1">{helperText}</p>}</div>);
    }

    function App(){
      const[activeTab,setActiveTab]=useState('rcpc');
      const[saved,setSaved]=useState(false);
      const[showValidation,setShowValidation]=useState(false);
      const[cfg,setCfg]=useState({
        enabled:true, bannerSize:'640x200', adKey:'', pointclickRcpc:true,
        sectionName:'보는 광고', title:'매일 광고 클릭하고 리워드 받자!',
        description:'매일 1시간마다 광고 누르면 리워드 지급', pageTitle:'RCPC',
        rewardAmount:'5', frequencyCap:'24', cooldownHours:'1'
      });
      const tabs=[{id:'rcpc',label:'RCPC',isNew:true},{id:'attendance',label:'출석체크'},{id:'video',label:'동영상 광고'},{id:'mission',label:'미션 설정'}];
      const u=(k,v)=>setCfg(p=>({...p,[k]:v}));
      const handleSave=()=>{if(!cfg.adKey){setShowValidation(true);return}setSaved(true);setShowValidation(false);setTimeout(()=>setSaved(false),2000)};

      return(
        <div className="min-h-screen bg-slate-100 flex items-start justify-center p-4 md:p-8">
          <div className="w-full max-w-2xl bg-white rounded-2xl shadow-sm border overflow-hidden">
            {/* 팝업 헤더 */}
            <div className="bg-gray-800 text-white px-5 py-3 flex items-center justify-between">
              <h2 className="text-sm font-semibold">홈화면 상세 관리</h2>
              <span className="text-gray-400 text-lg cursor-pointer hover:text-white">×</span>
            </div>
            {/* 탭 */}
            <div className="border-b flex">
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`relative px-5 py-3 text-sm font-medium transition-colors ${activeTab===t.id?'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50':'text-gray-500 hover:text-gray-700'}`}>
                  {t.label}{t.isNew&&<span className="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-[8px] px-1 py-0.5 rounded-full font-bold">NEW</span>}
                </button>
              ))}
            </div>
            {/* 콘텐츠 */}
            {activeTab==='rcpc'?(
              <div className="p-5 space-y-6 fade-in">
                {/* 기본 설정 */}
                <div>
                  <h3 className="text-sm font-bold text-gray-900 mb-3">기본 설정</h3>
                  <div className="space-y-4 bg-gray-50 rounded-xl p-4">
                    <Toggle checked={cfg.enabled} onChange={v=>u('enabled',v)} label="노출 상태"/>
                    <Select label="배너 이미지 사이즈" required value={cfg.bannerSize} onChange={v=>u('bannerSize',v)} options={[{value:'640x100',label:'640 × 100'},{value:'640x200',label:'640 × 200'},{value:'640x500',label:'640 × 500'}]}/>
                  </div>
                </div>
                {/* 문구 설정 */}
                <div>
                  <h3 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">문구 설정 <span className="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">신규</span></h3>
                  <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 space-y-3">
                    <Input label="섹션명" value={cfg.sectionName} onChange={v=>u('sectionName',v)} placeholder="보는 광고" isNew required/>
                    <Input label="타이틀 문구" value={cfg.title} onChange={v=>u('title',v)} placeholder="매일 광고 클릭하고 리워드 받자!" isNew required/>
                    <Input label="설명 문구" value={cfg.description} onChange={v=>u('description',v)} placeholder="매일 1시간마다 광고 누르면 리워드 지급" isNew/>
                    <Input label="페이지 타이틀" value={cfg.pageTitle} onChange={v=>u('pageTitle',v)} placeholder="RCPC" isNew/>
                  </div>
                </div>
                {/* 광고 연동 */}
                <div>
                  <h3 className="text-sm font-bold text-gray-900 mb-3">광고 연동 설정</h3>
                  <div className="space-y-4 bg-gray-50 rounded-xl p-4">
                    <div>
                      <Input label="카울리 소재 (ad_key)" required isNew value={cfg.adKey} onChange={v=>{u('adKey',v);if(showValidation&&v)setShowValidation(false)}} placeholder="고정 ad_key 값 입력" helperText="카울리/PointClick RCPC 통합 집계 기준 — 필수 입력"/>
                      {showValidation&&!cfg.adKey&&<p className="text-xs text-red-500 mt-1 font-medium">⚠ ad_key는 필수 입력 항목입니다.</p>}
                    </div>
                    <div className="border-t pt-3">
                      <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2"><span className="text-xs font-medium text-gray-600">PointClick RCPC 광고 호출</span><span className="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">신규</span></div>
                        <Toggle checked={cfg.pointclickRcpc} onChange={v=>u('pointclickRcpc',v)}/>
                      </div>
                      <p className="text-[11px] text-gray-400">카울리 소진 시 자동 호출 (2순위) — 동일 ad_key 기준 집계</p>
                    </div>
                  </div>
                </div>
                {/* 리워드 설정 */}
                <div>
                  <h3 className="text-sm font-bold text-gray-900 mb-3">리워드 설정</h3>
                  <div className="space-y-3 bg-gray-50 rounded-xl p-4">
                    <div className="grid grid-cols-2 gap-3">
                      <Input label="리워드 지급량 (P)" value={cfg.rewardAmount} onChange={v=>u('rewardAmount',v)} placeholder="5"/>
                      <Input label="일일 참여 제한 (회)" value={cfg.frequencyCap} onChange={v=>u('frequencyCap',v)} placeholder="24"/>
                    </div>
                    <Input label="참여 간격 (시간)" value={cfg.cooldownHours} onChange={v=>u('cooldownHours',v)} placeholder="1" helperText="참여 후 다음 참여까지 대기 시간"/>
                  </div>
                </div>
                {/* 버튼 */}
                <div className="flex items-center gap-3 pt-2 border-t">
                  <button onClick={handleSave} className="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition shadow-sm">저장</button>
                  <button className="bg-gray-200 text-gray-600 px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-300 transition">취소</button>
                  {saved&&<span className="text-sm text-green-600 font-medium fade-in">✅ 저장되었습니다</span>}
                </div>
                {/* 주석 */}
                <div className="bg-slate-50 rounded-xl p-3 text-[11px] text-gray-500 space-y-0.5 border">
                  <p>※ <span className="text-red-500 font-medium">*</span> 필수 입력 — 미입력 시 저장 불가</p>
                  <p>※ <span className="bg-red-500 text-white px-1 rounded text-[9px]">신규</span> 항목은 현재 어드민 미존재 → 신규 입력 필드 개발 필요</p>
                  <p>※ 광고 순서: 카울리 1순위 → PointClick RCPC 2순위 → 전체 소진 시 안내 문구 노출</p>
                </div>
              </div>
            ):(
              <div className="p-10 text-center text-gray-400"><p className="text-lg mb-1">🔧</p><p className="text-sm">{tabs.find(t=>t.id===activeTab)?.label} 설정</p><p className="text-xs mt-1">(기존 기능 — 이번 기획 범위 아님)</p></div>
            )}
          </div>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
